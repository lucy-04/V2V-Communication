; V2V Communication System — PlatformIO Configuration
; Target: ESP32 DevKit v1

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; NRF24L01  (TMRh20 RF24 fork)
; NeoGPS    (fast NMEA parser)
lib_deps =
    nRF24/RF24@^1.4.7
    SlashDevin/NeoGPS@^4.2.9
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5

; Enable dual-core FreeRTOS (default on ESP32-Arduino)
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DNRF24_PA_LEVEL=RF24_PA_MAX
